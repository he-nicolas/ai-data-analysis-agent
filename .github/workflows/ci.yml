name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  lint-and-unit-tests:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest ruff

      - name: Lint
        run: ruff check src/

      - name: Unit tests (fast, no real DB/subprocess/filesystem)
        run: pytest tests -v


  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-unit-tests
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t agent-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t agent-frontend:ci .


  manual-eval:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .

      - name: Run golden-set evaluation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python evals/eval_harness.py

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: evals/report_*.json